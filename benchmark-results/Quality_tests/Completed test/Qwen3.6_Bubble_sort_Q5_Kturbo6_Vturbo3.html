<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Sort Visualizer</title>

  <!-- ===================== STYLES ===================== -->
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f0f6fc;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 28px;
    }

    /* ---------- Controls Panel ---------- */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px 24px;
    }

    .btn {
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.2s, background-color 0.2s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    #startBtn {
      background-color: #238636;
      color: #fff;
    }

    #startBtn:hover:not(:disabled) {
      background-color: #2ea043;
      box-shadow: 0 0 12px rgba(46, 160, 67, 0.35);
    }

    #resetBtn {
      background-color: #30363d;
      color: #c9d1d9;
      border: 1px solid #484f58;
    }

    #resetBtn:hover:not(:disabled) {
      background-color: #484f58;
      box-shadow: 0 0 12px rgba(72, 79, 88, 0.35);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Speed slider */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .speed-control label {
      font-size: 0.85rem;
      color: #8b949e;
      white-space: nowrap;
    }

    #speedSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 6px;
      border-radius: 3px;
      background: #30363d;
      outline: none;
    }

    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(88, 166, 255, 0.4);
    }

    #speedSlider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
      border: none;
    }

    #speedValue {
      font-size: 0.85rem;
      color: #58a6ff;
      font-weight: 600;
      min-width: 38px;
    }

    /* ---------- Stats Bar ---------- */
    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 22px;
      font-size: 0.9rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label {
      color: #8b949e;
    }

    .stat-value {
      font-weight: 700;
      color: #f0f6fc;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Legend ---------- */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 18px;
      font-size: 0.82rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .swatch-default  { background-color: #3b82f6; }
    .swatch-comparing { background-color: #f59e0b; }
    .swatch-sorted    { background-color: #10b981; }

    /* ---------- Visualization Container ---------- */
    #visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 340px;
      width: 100%;
      max-width: 900px;
      padding: 0 10px;
    }

    /* Individual bar */
    .bar {
      flex: 1;
      min-width: 4px;
      max-width: 32px;
      border-radius: 3px 3px 0 0;
      transition: background-color 0.1s ease, height 0.15s ease;
      background-color: #3b82f6;
      position: relative;
    }

    /* Value label on hover */
    .bar:hover::after {
      content: attr(data-value);
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #c9d1d9;
      background: #1c2128;
      padding: 2px 5px;
      border-radius: 4px;
      white-space: nowrap;
      border: 1px solid #30363d;
      pointer-events: none;
    }

    /* State classes */
    .bar.comparing {
      background-color: #f59e0b;
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
    }

    .bar.sorted {
      background-color: #10b981;
    }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 30px;
      font-size: 0.78rem;
      color: #484f58;
    }
  </style>
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <h1>Bubble Sort Visualizer</h1>
  <p class="subtitle">Watch how Bubble Sort rearranges elements step by step</p>

  <!-- ===================== CONTROLS ===================== -->
  <div class="controls">
    <button id="startBtn" class="btn">▶ Start Sort</button>
    <button id="resetBtn" class="btn">↻ Reset</button>

    <div class="speed-control">
      <label for="speedSlider">Speed</label>
      <input type="range" id="speedSlider" min="1" max="100" value="50" />
      <span id="speedValue">50</span>
    </div>
  </div>

  <!-- ===================== STATS ===================== -->
  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">Comparisons:</span>
      <span id="comparisonCount" class="stat-value">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Swaps:</span>
      <span id="swapCount" class="stat-value">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Passes:</span>
      <span id="passCount" class="stat-value">0</span>
    </div>
  </div>

  <!-- ===================== LEGEND ===================== -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch swatch-default"></div>
      <span>Unsorted</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-comparing"></div>
      <span>Comparing</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-sorted"></div>
      <span>Sorted</span>
    </div>
  </div>

  <!-- ===================== VISUALIZATION ===================== -->
  <div id="visualizer"></div>

  <!-- ===================== FOOTER ===================== -->
  <p class="footer">Bubble Sort &bull; O(n²) time &bull; Vanilla JS</p>

  <!-- ===================== JAVASCRIPT ===================== -->
  <script>
    /*
     * ========================================
     *  BUBBLE SORT VISUALIZER — Vanilla JS
     * ========================================
     *
     *  Core idea:
     *  1. Generate a random array and render it as colored bars.
     *  2. When the user clicks "Start Sort", run Bubble Sort
     *     one step at a time using async/await and a delay
     *     function (so the browser can repaint between steps).
     *  3. Highlight the two bars being compared in amber,
     *     then mark bars that land in their final position
     *     in green.
     * ========================================
     */

    // ---------- DOM References ----------
    const visualizer   = document.getElementById("visualizer");
    const startBtn     = document.getElementById("startBtn");
    const resetBtn     = document.getElementById("resetBtn");
    const speedSlider  = document.getElementById("speedSlider");
    const speedValue   = document.getElementById("speedValue");
    const compCountEl  = document.getElementById("comparisonCount");
    const swapCountEl  = document.getElementById("swapCount");
    const passCountEl  = document.getElementById("passCount");

    // ---------- State ----------
    let array = [];                  // current numeric values
    let barElements = [];            // DOM elements for each bar
    let isSorting = false;           // guard against double-clicks
    let abortSort = false;           // signal to stop current sort

    const ARRAY_SIZE = 50;           // number of bars
    const MIN_VAL = 5;               // minimum bar height value
    const MAX_VAL = 100;             // maximum bar height value

    // ---------- Utility: Sleep with optional abort check ----------
    /**
     * Returns a promise that resolves after `ms` milliseconds.
     * If `abortSort` is set to true before the timeout fires,
     * the promise resolves immediately (cancelling the animation).
     */
    function sleep(ms) {
      return new Promise((resolve) => {
        const timer = setTimeout(resolve, ms);
        // If the user resets while we're sleeping, clear the timeout
        // and resolve immediately.
        const checkAbort = setInterval(() => {
          if (abortSort) {
            clearTimeout(timer);
            clearInterval(checkAbort);
            resolve();
          }
        }, 30);
      });
    }

    // ---------- Utility: Get delay from slider ----------
    // Slider value 1 (slow) → 100 (fast) maps to 500ms → 10ms
    function getDelay() {
      const v = parseInt(speedSlider.value, 10);
      // Linear interpolation: v=1  → 500ms, v=100 → 10ms
      return Math.round(500 - ((v - 1) / 99) * 490);
    }

    // ---------- Utility: Format slider display ----------
    speedSlider.addEventListener("input", () => {
      speedValue.textContent = speedSlider.value;
    });

    // ---------- Generate & Render Array ----------
    /**
     * Creates a new random array and builds the visual bars.
     * Clears any previous state.
     */
    function generateArray() {
      array = [];
      for (let i = 0; i < ARRAY_SIZE; i++) {
        array.push(Math.floor(Math.random() * (MAX_VAL - MIN_VAL + 1)) + MIN_VAL);
      }
      renderBars();
    }

    /**
     * Renders `array` as a set of vertical divs inside #visualizer.
     * Each div gets a CSS class, inline style for height, and
     * a data attribute for hover tooltips.
     */
    function renderBars() {
      visualizer.innerHTML = "";
      barElements = [];

      for (let i = 0; i < array.length; i++) {
        const bar = document.createElement("div");
        bar.classList.add("bar");
        // Height is proportional to the value relative to MAX_VAL
        bar.style.height = (array[i] / MAX_VAL * 100) + "%";
        bar.setAttribute("data-value", array[i]);
        // Remove previous state classes (if any)
        bar.classList.remove("comparing", "sorted");
        barElements.push(bar);
        visualizer.appendChild(bar);
      }
    }

    // ---------- Reset ----------
    /**
     * Stops any in-progress sort, resets stats, and generates
     * a brand-new random array.
     */
    function reset() {
      abortSort = true;       // wake up any sleeping step
      isSorting = false;
      startBtn.disabled = false;

      // Reset stats
      compCountEl.textContent = "0";
      swapCountEl.textContent = "0";
      passCountEl.textContent = "0";

      generateArray();
    }

    // ---------- Bubble Sort (Async) ----------
    /**
     * The heart of the visualizer. Runs Bubble Sort one comparison
     * at a time, yielding to the browser so the animation is
     * visible. Each step:
     *   1. Highlights the two bars being compared.
     *   2. Pauses (respecting the speed slider).
     *   3. If out of order, swaps them visually and increments swap count.
     *   4. Clears the "comparing" highlight.
     *   5. Marks the rightmost element of the current pass as "sorted".
     *
     * @async
     */
    async function bubbleSort() {
      const n = array.length;

      for (let pass = 0; pass < n - 1; pass++) {
        // Track whether any swap happened in this pass
        let swapped = false;

        // Increment pass counter for the stats
        passCountEl.textContent = pass + 1;

        for (let i = 0; i < n - 1 - pass; i++) {
          // --- Abort check: if user hit Reset, stop immediately ---
          if (abortSort) return;

          // Increment comparison counter
          const currentComp = parseInt(compCountEl.textContent, 10) + 1;
          compCountEl.textContent = currentComp;

          // --- Highlight the two bars being compared ---
          barElements[i].classList.add("comparing");
          barElements[i + 1].classList.add("comparing");

          // Pause so the user can see the comparison
          await sleep(getDelay());

          // Compare the two values
          if (array[i] > array[i + 1]) {
            // Swap the values in the array
            let temp = array[i];
            array[i] = array[i + 1];
            array[i + 1] = temp;

            // Increment swap counter
            const currentSwaps = parseInt(swapCountEl.textContent, 10) + 1;
            swapCountEl.textContent = currentSwaps;

            swapped = true;

            // Update bar heights to reflect the swap
            barElements[i].style.height = (array[i] / MAX_VAL * 100) + "%";
            barElements[i].setAttribute("data-value", array[i]);

            barElements[i + 1].style.height = (array[i + 1] / MAX_VAL * 100) + "%";
            barElements[i + 1].setAttribute("data-value", array[i + 1]);
          }

          // --- Remove "comparing" highlight ---
          barElements[i].classList.remove("comparing");
          barElements[i + 1].classList.remove("comparing");

          // --- Mark the element that's now in its final position ---
          // After each pass, the rightmost unsorted element is sorted.
          if (i === n - 2 - pass) {
            barElements[i + 1].classList.add("sorted");
          }
        }

        // If no swaps occurred, the array is already sorted — early exit
        if (!swapped) break;
      }

      // --- Final pass: mark everything as sorted ---
      // (covers the case where early exit happened)
      for (let i = 0; i < array.length; i++) {
        barElements[i].classList.add("sorted");
      }

      // Sorting is complete
      isSorting = false;
      startBtn.disabled = false;
    }

    // ---------- Event Listeners ----------

    // "Start Sort" button
    startBtn.addEventListener("click", () => {
      if (isSorting) return;          // guard: prevent double-start
      isSorting = true;
      abortSort = false;
      startBtn.disabled = true;

      // Clear any existing "sorted" classes from a previous run
      barElements.forEach(bar => bar.classList.remove("sorted"));

      // Reset stats for the new run
      compCountEl.textContent = "0";
      swapCountEl.textContent = "0";
      passCountEl.textContent = "0";

      bubbleSort();
    });

    // "Reset" button
    resetBtn.addEventListener("click", reset);

    // ---------- Initialization ----------
    generateArray();
  </script>
</body>
</html>
