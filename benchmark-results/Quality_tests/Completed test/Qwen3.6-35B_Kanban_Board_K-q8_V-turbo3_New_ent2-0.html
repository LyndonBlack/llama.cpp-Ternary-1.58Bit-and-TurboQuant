<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-column: rgba(26, 29, 39, 0.65);
  --bg-card: rgba(35, 39, 52, 0.75);
  --bg-card-hover: rgba(45, 50, 68, 0.9);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-hover: rgba(255, 255, 255, 0.15);
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b0;
  --text-muted: #6b7185;
  --accent-blue: #5b8def;
  --accent-red: #ef5b5b;
  --accent-amber: #f5a623;
  --accent-green: #5bc47f;
  --done-color: #7a7f94;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-column: 0 4px 24px rgba(0,0,0,0.4);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --transition-slow: 0.4s ease;
}

html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

/* ============================================================
   HEADER BAR
   ============================================================ */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  background: rgba(15, 17, 23, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
  z-index: 100;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #5b8def, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.search-container {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
}

.search-container svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: border-color var(--transition-fast), background var(--transition-fast);
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--accent-blue);
  background: rgba(255, 255, 255, 0.08);
}

.priority-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.priority-filter label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.priority-filter select {
  padding: 8px 12px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.8rem;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition-fast);
}

.priority-filter select:focus {
  border-color: var(--accent-blue);
}

.priority-filter select option {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

/* ============================================================
   BOARD AREA
   ============================================================ */
.board-wrapper {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 24px;
  display: flex;
  align-items: flex-start;
  gap: 20px;
}

.board-wrapper::-webkit-scrollbar {
  height: 8px;
}

.board-wrapper::-webkit-scrollbar-track {
  background: transparent;
}

.board-wrapper::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
}

.board-wrapper::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.2);
}

/* ============================================================
   COLUMN
   ============================================================ */
.column {
  min-width: 300px;
  max-width: 300px;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 160px);
  background: var(--bg-column);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-column);
  transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
  flex-shrink: 0;
}

.column.drag-over {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 2px rgba(91, 141, 239, 0.25), var(--shadow-column);
  animation: columnPulse 1.5s ease-in-out infinite;
}

@keyframes columnPulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(91, 141, 239, 0.25), var(--shadow-column); }
  50% { box-shadow: 0 0 0 3px rgba(91, 141, 239, 0.4), var(--shadow-column); }
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border-color);
  cursor: default;
  user-select: none;
}

.column-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  outline: none;
  border: none;
  background: transparent;
  font-family: inherit;
  letter-spacing: -0.01em;
  flex: 1;
  margin-right: 8px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background var(--transition-fast);
}

.column-title:focus {
  background: rgba(255, 255, 255, 0.08);
  cursor: text;
}

.column-title-input {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  outline: none;
  border: 1px solid var(--accent-blue);
  background: rgba(255, 255, 255, 0.1);
  font-family: inherit;
  letter-spacing: -0.01em;
  padding: 2px 8px;
  border-radius: 4px;
}

.column-header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.column:hover .column-header-actions {
  opacity: 1;
}

.column-header-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.column-header-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

.column-header-btn.delete:hover {
  background: rgba(239, 91, 91, 0.2);
  color: var(--accent-red);
}

.column-header-btn svg {
  width: 16px;
  height: 16px;
}

.card-count {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
  background: rgba(255, 255, 255, 0.06);
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}

/* ============================================================
   CARD LIST
   ============================================================ */
.card-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
  transition: min-height var(--transition-fast);
}

.card-list::-webkit-scrollbar {
  width: 4px;
}

.card-list::-webkit-scrollbar-track {
  background: transparent;
}

.card-list::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
}

.card-list::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.15);
}

/* ============================================================
   CARD
   ============================================================ */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 14px;
  cursor: grab;
  transition: all var(--transition-normal);
  position: relative;
  animation: cardFadeIn 0.3s ease forwards;
}

@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card.fade-out {
  opacity: 0;
  transform: scale(0.95);
  transition: all 0.25s ease;
}

.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-card);
  transform: translateY(-2px);
}

.card:active {
  cursor: grabbing;
}

.card.dragging {
  opacity: 0.4;
  transform: scale(0.98);
}

.card.done-card {
  opacity: 0.7;
}

.card.done-card .card-title {
  text-decoration: line-through;
  color: var(--done-color);
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.card-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
  word-break: break-word;
}

.card-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition-fast);
  flex-shrink: 0;
}

.card:hover .card-actions {
  opacity: 1;
}

.card-action-btn {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: 4px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.card-action-btn:hover {
  background: rgba(239, 91, 91, 0.2);
  color: var(--accent-red);
}

.card-action-btn svg {
  width: 14px;
  height: 14px;
}

/* Priority Badge */
.priority-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.priority-badge.high {
  background: rgba(239, 91, 91, 0.15);
  color: var(--accent-red);
  border: 1px solid rgba(239, 91, 91, 0.25);
}

.priority-badge.medium {
  background: rgba(245, 166, 35, 0.15);
  color: var(--accent-amber);
  border: 1px solid rgba(245, 166, 35, 0.25);
}

.priority-badge.low {
  background: rgba(91, 196, 127, 0.15);
  color: var(--accent-green);
  border: 1px solid rgba(91, 196, 127, 0.25);
}

/* Due Date */
.card-due-date {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.73rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.card-due-date.overdue {
  color: var(--accent-red);
  font-weight: 600;
}

.card-due-date svg {
  width: 12px;
  height: 12px;
}

/* Description */
.card-description {
  font-size: 0.78rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-top: 6px;
  word-break: break-word;
}

/* Hidden card placeholder */
.card.hidden-card {
  visibility: hidden;
  pointer-events: none;
  min-height: 0;
  padding: 0;
  margin: 0;
  border: none;
  background: transparent;
  backdrop-filter: none;
  opacity: 0;
  overflow: hidden;
  max-height: 0;
}

/* ============================================================
   ADD CARD BUTTON
   ============================================================ */
.add-card-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  margin: 0 12px 12px;
  background: transparent;
  border: 1px dashed var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  width: calc(100% - 24px);
}

.add-card-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(91, 141, 239, 0.05);
}

.add-card-btn svg {
  width: 16px;
  height: 16px;
}

/* ============================================================
   INLINE CARD FORM
   ============================================================ */
.card-form {
  padding: 12px;
  margin: 0 12px 12px;
  background: rgba(45, 50, 68, 0.9);
  border: 1px solid var(--accent-blue);
  border-radius: var(--radius-md);
  animation: cardFadeIn 0.2s ease;
}

.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.82rem;
  outline: none;
  transition: border-color var(--transition-fast);
  margin-bottom: 8px;
}

.form-input:focus, .form-textarea:focus, .form-select:focus {
  border-color: var(--accent-blue);
}

.form-input::placeholder, .form-textarea::placeholder {
  color: var(--text-muted);
}

.form-textarea {
  resize: vertical;
  min-height: 60px;
  max-height: 150px;
}

.form-select {
  cursor: pointer;
}

.form-select option {
  background: var(--bg-secondary);
}

.form-date-input {
  width: 100%;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.82rem;
  outline: none;
  transition: border-color var(--transition-fast);
  margin-bottom: 8px;
}

.form-date-input:focus {
  border-color: var(--accent-blue);
}

.form-date-input::-webkit-calendar-picker-indicator {
  filter: invert(0.7);
}

.form-row {
  display: flex;
  gap: 8px;
}

.form-row > * {
  flex: 1;
}

.form-buttons {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.form-btn-save, .form-btn-cancel {
  padding: 7px 16px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  border: none;
}

.form-btn-save {
  background: var(--accent-blue);
  color: #fff;
}

.form-btn-save:hover {
  background: #4a7de0;
}

.form-btn-cancel {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
}

.form-btn-cancel:hover {
  background: rgba(255, 255, 255, 0.14);
  color: var(--text-primary);
}

/* ============================================================
   ADD COLUMN BUTTON
   ============================================================ */
.add-column-btn {
  min-width: 260px;
  max-width: 260px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px dashed var(--border-color);
  border-radius: var(--radius-lg);
  color: var(--text-muted);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  flex-shrink: 0;
  align-self: center;
}

.add-column-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(91, 141, 239, 0.05);
}

.add-column-btn svg {
  width: 18px;
  height: 18px;
}

/* ============================================================
   ADD COLUMN FORM
   ============================================================ */
.add-column-form {
  min-width: 260px;
  max-width: 260px;
  padding: 14px;
  background: var(--bg-column);
  backdrop-filter: blur(16px);
  border: 1px solid var(--accent-blue);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-column);
  flex-shrink: 0;
  animation: cardFadeIn 0.2s ease;
}

.add-column-form input {
  width: 100%;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  margin-bottom: 10px;
  transition: border-color var(--transition-fast);
}

.add-column-form input:focus {
  border-color: var(--accent-blue);
}

.add-column-form input::placeholder {
  color: var(--text-muted);
}

/* ============================================================
   STATISTICS BAR
   ============================================================ */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 12px 24px;
  background: rgba(15, 17, 23, 0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
  z-index: 100;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.stat-value {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-primary);
}

.stat-item.overdue .stat-value {
  color: var(--accent-red);
}

.stat-item.done .stat-value {
  color: var(--accent-green);
}

.stat-item.completion .stat-value {
  color: var(--accent-blue);
}

.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.stat-dot.total { background: var(--accent-blue); }
.stat-dot.overdue { background: var(--accent-red); }
.stat-dot.done { background: var(--accent-green); }
.stat-dot.completion { background: var(--accent-blue); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .header {
    padding: 12px 16px;
    gap: 10px;
  }

  .header h1 {
    font-size: 1.1rem;
  }

  .search-container {
    min-width: 160px;
  }

  .board-wrapper {
    padding: 16px;
    gap: 14px;
  }

  .column {
    min-width: 270px;
    max-width: 270px;
  }

  .stats-bar {
    gap: 16px;
    padding: 10px 16px;
  }
}

@media (max-width: 480px) {
  .column {
    min-width: 250px;
    max-width: 250px;
  }

  .header h1 {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<div class="header">
  <h1>📋 Kanban Board</h1>
  <div class="search-container">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search cards...">
  </div>
  <div class="priority-filter">
    <label for="priorityFilter">Priority:</label>
    <select id="priorityFilter">
      <option value="all">All</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
  </div>
</div>

<!-- ============================================================
     BOARD
     ============================================================ -->
<div class="board-wrapper" id="boardWrapper">
  <!-- Columns rendered here by JS -->
  <button class="add-column-btn" id="addColumnBtn">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
    </svg>
    Add Column
  </button>
</div>

<!-- ============================================================
     STATISTICS BAR
     ============================================================ -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-dot total"></span>
    Total: <span class="stat-value" id="statTotal">0</span>
  </div>
  <div class="stat-item overdue">
    <span class="stat-dot overdue"></span>
    Overdue: <span class="stat-value" id="statOverdue">0</span>
  </div>
  <div class="stat-item done">
    <span class="stat-dot done"></span>
    Done: <span class="stat-value" id="statDone">0</span>
  </div>
  <div class="stat-item completion">
    <span class="stat-dot completion"></span>
    Completion: <span class="stat-value" id="statCompletion">0%</span>
  </div>
</div>

<script>
/* ================================================================
   STATE
   ================================================================ */
const STORAGE_KEY = 'kanban_board_state';

/**
 * Default board state — used when no saved state exists.
 */
function getDefaultState() {
  const today = new Date();
  const fmt = (d) => d.toISOString().split('T')[0];
  const addDays = (n) => { const d = new Date(today); d.setDate(d.getDate() + n); return fmt(d); };

  return {
    columns: [
      {
        id: 'col-1',
        title: 'Backlog',
        cards: [
          {
            id: 'card-1',
            title: 'Research competitive analysis',
            description: 'Look into top 5 competitors and summarize their features, pricing, and market positioning.',
            priority: 'Medium',
            dueDate: addDays(5),
            done: false
          },
          {
            id: 'card-2',
            title: 'Brainstorm project ideas',
            description: '',

let boardState = null;
let searchQuery = '';
let priorityFilter = 'all';
let draggedCardId = null;
let draggedFromColumnId = null;
let activeFormColumnId = null; // column where inline card form is open
let activeColumnFormId = null; // column where add-column form is open

/**
 * Load state from localStorage, or generate defaults.
 */
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      boardState = JSON.parse(saved);
      // Validate structure
      if (!boardState.columns || !Array.isArray(boardState.columns)) {
        boardState = getDefaultState();
      }
    } else {
      boardState = getDefaultState();
    }
  } catch (e) {
    boardState = getDefaultState();
  }
}

/**
 * Save current state to localStorage.
 */
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(boardState));
  } catch (e) {
    console.warn('Failed to save state:', e);
  }
}

/* ================================================================
   UTILITY
   ================================================================ */
function generateId() {
  return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const options = { month: 'short', day: 'numeric', year: 'numeric' };
  return d.toLocaleDateString('en-US', options);
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dateStr + 'T00:00:00');
  return due < today;
}

function isOverdueButDone(dateStr) {
  return isOverdue(dateStr);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ================================================================
   RENDERING
   ================================================================ */
const boardWrapper = document.getElementById('boardWrapper');
const addColumnBtn = document.getElementById('addColumnBtn');

function getFilteredCard(card) {
  // Search filter
  if (searchQuery && !card.title.toLowerCase().includes(searchQuery.toLowerCase())) {
    return 'search';
  }
  // Priority filter
  if (priorityFilter !== 'all' && card.priority !== priorityFilter) {
    return 'priority';
  }
  return 'visible';
}

function renderBoard() {
  // Remove all columns and column form from DOM (but keep add-column button)
  const existingColumns = boardWrapper.querySelectorAll('.column');
  existingColumns.forEach(col => col.remove());

  const existingColumnForm = boardWrapper.querySelector('.add-column-form');
  if (existingColumnForm) existingColumnForm.remove();

  boardState.columns.forEach(column => {
    const colEl = createColumnElement(column);
    boardWrapper.insertBefore(colEl, addColumnBtn);
  });

  // Re-show the add-column form if it was open
  if (activeColumnFormId) {
    showAddColumnForm(activeColumnFormId);
  }

  updateStats();
}

function createColumnElement(column) {
  const col = document.createElement('div');
  col.className = 'column';
  col.dataset.columnId = column.id;

  // Count visible cards (for card count badge)
  const visibleCards = column.cards.filter(c => {
    const filter = getFilteredCard(c);
    return filter === 'visible';
  });
  const totalCount = column.cards.length;

  // ---- HEADER ----
  const header = document.createElement('div');
  header.className = 'column-header';

  const titleEl = document.createElement('span');
  titleEl.className = 'column-title';
  titleEl.textContent = column.title;

  const headerActions = document.createElement('div');
  headerActions.className = 'column-header-actions';

  // Delete button
  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'column-header-btn delete';
  deleteBtn.title = 'Delete column (must be empty)';
  deleteBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>';
  deleteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (column.cards.length === 0) {
      boardState.columns = boardState.columns.filter(c => c.id !== column.id);
      saveState();
      renderBoard();
    } else {
      // Show a brief tooltip-like message
      titleEl.textContent = 'Column not empty!';
      titleEl.style.color = 'var(--accent-red)';
      setTimeout(() => {
        titleEl.textContent = column.title;
        titleEl.style.color = '';
      }, 1500);
    }
  });

  // Card count
  const countBadge = document.createElement('span');
  countBadge.className = 'card-count';
  countBadge.textContent = `${column.cards.length}`;

  headerActions.appendChild(deleteBtn);
  header.appendChild(titleEl);
  header.appendChild(countBadge);
  header.appendChild(headerActions);

  // Double-click to rename
  titleEl.addEventListener('dblclick', (e) => {
    e.stopPropagation();
    const input = document.createElement('input');
    input.className = 'column-title-input';
    input.value = column.title;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    const finishRename = () => {
      const newTitle = input.value.trim() || column.title;
      column.title = newTitle;
      saveState();
      renderBoard();
    };

    input.addEventListener('blur', finishRename);
    input.addEventListener('keydown', (ke) => {
      if (ke.key === 'Enter') { input.blur(); }
      if (ke.key === 'Escape') { input.value = column.title; input.blur(); }
    });
  });

  col.appendChild(header);

  // ---- CARD LIST ----
  const cardList = document.createElement('div');
  cardList.className = 'card-list';
  cardList.dataset.columnId = column.id;

  column.cards.forEach(card => {
    const filter = getFilteredCard(card);
    const cardEl = createCardElement(card, column.id);

    if (filter !== 'visible') {
      cardEl.classList.add('hidden-card');
    }

    cardList.appendChild(cardEl);
  });

  // Drop zone events
  cardList.addEventListener('dragover', handleDragOver);
  cardList.addEventListener('dragenter', handleDragEnter);
  cardList.addEventListener('dragleave', handleDragLeave);
  cardList.addEventListener('drop', handleDrop);

  col.appendChild(cardList);

  // ---- ADD CARD BUTTON ----
  const addCardBtn = document.createElement('button');
  addCardBtn.className = 'add-card-btn';
  addCardBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg> Add card';

  if (activeFormColumnId === column.id) {
    // Show form
    col.appendChild(createCardForm(column.id));
  }

  addCardBtn.addEventListener('click', () => {
    activeFormColumnId = column.id;
    renderBoard();
    // Focus the title input
    setTimeout(() => {
      const form = col.querySelector('.card-form');
      if (form) {
        const titleInput = form.querySelector('.form-input');
        if (titleInput) titleInput.focus();
      }
    }, 50);
  });

  col.appendChild(addCardBtn);

  return col;
}

function createCardElement(card, columnId) {
  const cardEl = document.createElement('div');
  cardEl.className = 'card';
  if (card.done) cardEl.classList.add('done-card');
  cardEl.dataset.cardId = card.id;
  cardEl.draggable = true;

  // Drag start
  cardEl.addEventListener('dragstart', (e) => {
    draggedCardId = card.id;
    draggedFromColumnId = columnId;
    cardEl.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });

  cardEl.addEventListener('dragend', () => {
    cardEl.classList.remove('dragging');
    draggedCardId = null;
    draggedFromColumnId = null;
    // Remove all drag-over states
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
  });

  // ---- HEADER: title + delete button ----
  const cardHeader = document.createElement('div');
  cardHeader.className = 'card-header';

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = card.title;

  const cardActions = document.createElement('div');
  cardActions.className = 'card-actions';

  const deleteCardBtn = document.createElement('button');
  deleteCardBtn.className = 'card-action-btn';
  deleteCardBtn.title = 'Delete card';
  deleteCardBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>';
  deleteCardBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    cardEl.classList.add('fade-out');
    setTimeout(() => {
      const col = boardState.columns.find(c => c.id === columnId);
      if (col) {
        col.cards = col.cards.filter(c => c.id !== card.id);
        saveState();
        renderBoard();
      }
    }, 250);
  });

  cardActions.appendChild(deleteCardBtn);
  cardHeader.appendChild(titleEl);
  cardHeader.appendChild(cardActions);
  cardEl.appendChild(cardHeader);

  // ---- PRIORITY BADGE ----
  if (card.priority) {
    const badge = document.createElement('span');
    badge.className = `priority-badge ${card.priority.toLowerCase()}`;
    badge.textContent = card.priority;
    cardEl.appendChild(badge);
  }

  // ---- DUE DATE ----
  if (card.dueDate) {
    const overdue = isOverdue(card.dueDate) && !card.done;
    const dueEl = document.createElement('div');
    dueEl.className = `card-due-date${overdue ? ' overdue' : ''}`;
    dueEl.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      ${overdue ? '<span style="margin-right:2px">⚠️</span>' : ''}${formatDate(card.dueDate)}
    `;
    cardEl.appendChild(dueEl);
  }

  // ---- DESCRIPTION ----
  if (card.description) {
    const descEl = document.createElement('div');
    descEl.className = 'card-description';
    descEl.textContent = card.description;
    cardEl.appendChild(descEl);
  }

  return cardEl;
}

function createCardForm(columnId) {
  const form = document.createElement('div');
  form.className = 'card-form';

  const titleInput = document.createElement('input');
  titleInput.className = 'form-input';
  titleInput.type = 'text';
  titleInput.placeholder = 'Card title *';
  titleInput.required = true;

  const prioritySelect = document.createElement('select');
  prioritySelect.className = 'form-select';
  prioritySelect.innerHTML = `
    <option value="Low">Low</option>
    <option value="Medium" selected>Medium</option>
    <option value="High">High</option>
  `;

  const dateInput = document.createElement('input');
  dateInput.className = 'form-date-input';
  dateInput.type = 'date';

  const descTextarea = document.createElement('textarea');
  descTextarea.className = 'form-textarea';
  descTextarea.placeholder = 'Description (optional)...';

  const buttonsDiv = document.createElement('div');
  buttonsDiv.className = 'form-buttons';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'form-btn-save';
  saveBtn.textContent = 'Save';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'form-btn-cancel';
  cancelBtn.textContent = 'Cancel';

  buttonsDiv.appendChild(saveBtn);
  buttonsDiv.appendChild(cancelBtn);

  form.appendChild(titleInput);

  const rowDiv = document.createElement('div');
  rowDiv.className = 'form-row';
  rowDiv.appendChild(prioritySelect);
  rowDiv.appendChild(dateInput);
  form.appendChild(rowDiv);

  form.appendChild(descTextarea);
  form.appendChild(buttonsDiv);

  // Save handler
  saveBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    if (!title) {
      titleInput.style.borderColor = 'var(--accent-red)';
      titleInput.focus();
      setTimeout(() => { titleInput.style.borderColor = ''; }, 1500);
      return;
    }

    const col = boardState.columns.find(c => c.id === columnId);
    if (!col) return;

    const newCard = {
      id: generateId(),
      title: title,
      description: descTextarea.value.trim(),
      priority: prioritySelect.value,
      dueDate: dateInput.value || '',
      done: false
    };

    col.cards.push(newCard);
    activeFormColumnId = null;
    saveState();
    renderBoard();
  });

  // Enter to save
  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      saveBtn.click();
    }
  });
  descTextarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.ctrlKey) {
      e.preventDefault();
      saveBtn.click();
    }
  });

  cancelBtn.addEventListener('click', () => {
    activeFormColumnId = null;
    renderBoard();
  });

  return form;
}

function showAddColumnForm(columnId) {
  // Remove any existing add-column-form
  const existing = boardWrapper.querySelector('.add-column-form');
  if (existing) existing.remove();

  const form = document.createElement('div');
  form.className = 'add-column-form';
  form.id = 'addColumnFormEl';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Column name...';
  input.id = 'addColumnNameInput';

  const buttonsDiv = document.createElement('div');
  buttonsDiv.className = 'form-buttons';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'form-btn-save';
  saveBtn.textContent = 'Add';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'form-btn-cancel';
  cancelBtn.textContent = 'Cancel';

  buttonsDiv.appendChild(saveBtn);
  buttonsDiv.appendChild(cancelBtn);

  form.appendChild(input);
  form.appendChild(buttonsDiv);

  boardWrapper.insertBefore(form, addColumnBtn);

  setTimeout(() => input.focus(), 50);

  const finish = () => {
    const name = input.value.trim();
    if (name) {
      const newCol = {
        id: generateId(),
        title: name,
        cards: []
      };
      boardState.columns.push(newCol);
      activeColumnFormId = null;
      saveState();
      renderBoard();
    } else {
      activeColumnFormId = null;
      renderBoard();
    }
  };

  saveBtn.addEventListener('click', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { finish(); }
    if (e.key === 'Escape') {
      activeColumnFormId = null;
      renderBoard();
    }
  });
  cancelBtn.addEventListener('click', () => {
    activeColumnFormId = null;
    renderBoard();
  });
}

/* ================================================================
   ADD COLUMN BUTTON
   ================================================================ */
addColumnBtn.addEventListener('click', () => {
  activeColumnFormId = 'new-column';
  // Remove all columns and re-add before the button
  const existingColumns = boardWrapper.querySelectorAll('.column');
  existingColumns.forEach(col => col.remove());

  boardState.columns.forEach(column => {
    const colEl = createColumnElement(column);
    boardWrapper.insertBefore(colEl, addColumnBtn);
  });

  // Show the add-column form
  showAddColumnForm('new-column');

  // Focus the input
  setTimeout(() => {
    const input = document.getElementById('addColumnNameInput');
    if (input) input.focus();
  }, 50);
});

/* ================================================================
   DRAG & DROP
   ================================================================ */
function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDragEnter(e) {
  e.preventDefault();
  const column = e.currentTarget.closest('.column');
  if (column) {
    column.classList.add('drag-over');
  }
}

function handleDragLeave(e) {
  // Only remove if leaving the column entirely (not entering a child element)
  const column = e.currentTarget.closest('.column');
  if (column && !column.contains(e.relatedTarget)) {
    column.classList.remove('drag-over');
  }
}

function handleDrop(e) {
  e.preventDefault();
  const column = e.currentTarget.closest('.column');
  if (!column) return;
  column.classList.remove('drag-over');

  const targetColumnId = column.dataset.columnId;
  const cardId = draggedCardId;

  if (!cardId || !targetColumnId) return;

  // Find source column and card
  let sourceColumn = null;
  let cardIndex = -1;
  for (const col of boardState.columns) {
    cardIndex = col.cards.findIndex(c => c.id === cardId);
    if (cardIndex !== -1) {
      sourceColumn = col;
      break;
    }
  }

  if (!sourceColumn || cardIndex === -1) return;

  // Remove card from source
  const [card] = sourceColumn.cards.splice(cardIndex, 1);

  // If moving to Done column, mark as done
  const doneColumn = boardState.columns.find(c => c.title === 'Done');
  if (doneColumn && doneColumn.id === targetColumnId) {
    card.done = true;
  }

  // Add card to target column (at the end)
  const targetCol = boardState.columns.find(c => c.id === targetColumnId);
  if (targetCol) {
    targetCol.cards.push(card);
  }

  saveState();
  renderBoard();
}

/* ================================================================
   FILTERING
   ================================================================ */
const searchInput = document.getElementById('searchInput');
const priorityFilterEl = document.getElementById('priorityFilter');

searchInput.addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  // Re-render to apply filters
  renderBoard();
});

priorityFilterEl.addEventListener('change', (e) => {
  priorityFilter = e.target.value;
  renderBoard();
});

/* ================================================================
   STATISTICS
   ================================================================ */
function updateStats() {
  let total = 0;
  let overdue = 0;
  let done = 0;

  boardState.columns.forEach(col => {
    col.cards.forEach(card => {
      total++;
      if (card.done) done++;
      if (isOverdue(card.dueDate) && !card.done) overdue++;
    });
  });

  const completionRate = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOverdue').textContent = overdue;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statCompletion').textContent = completionRate + '%';
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  loadState();
  renderBoard();
}

init();
</script>
