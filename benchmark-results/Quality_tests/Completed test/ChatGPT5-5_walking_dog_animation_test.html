<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title></title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #78bde7;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d", { alpha: false });

  let W = 1;
  let H = 1;
  let DPR = 1;
  let last = performance.now();
  let time = 0;

  const TAU = Math.PI * 2;

  const lerp = (a, b, t) => a + (b - a) * t;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const sin = Math.sin;
  const cos = Math.cos;

  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = Math.max(1, innerWidth);
    H = Math.max(1, innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }

  window.addEventListener("resize", resize, { passive: true });
  resize();

  function roundedRect(x, y, w, h, r) {
    r = Math.min(r, Math.abs(w) * 0.5, Math.abs(h) * 0.5);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function ellipsePath(x, y, rx, ry, rot = 0) {
    ctx.beginPath();
    ctx.ellipse(x, y, rx, ry, rot, 0, TAU);
    ctx.closePath();
  }

  function lineStroke(points, width, color, cap = "round", join = "round") {
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
    ctx.lineCap = cap;
    ctx.lineJoin = join;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.stroke();
  }

  function drawGradientSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#7ec9f2");
    g.addColorStop(0.45, "#bfe7fb");
    g.addColorStop(0.72, "#f5d6a4");
    g.addColorStop(1, "#8cc26e");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    const sunX = W * 0.82;
    const sunY = H * 0.18;
    const rg = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, H * 0.32);
    rg.addColorStop(0, "rgba(255,246,190,0.95)");
    rg.addColorStop(0.24, "rgba(255,230,135,0.42)");
    rg.addColorStop(1, "rgba(255,230,135,0)");
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  function drawCloud(cx, cy, s, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(cx - 42 * s, cy + 8 * s, 45 * s, 20 * s, 0, 0, TAU);
    ctx.ellipse(cx - 8 * s, cy - 8 * s, 42 * s, 28 * s, -0.05, 0, TAU);
    ctx.ellipse(cx + 33 * s, cy + 3 * s, 50 * s, 22 * s, 0.04, 0, TAU);
    ctx.ellipse(cx + 76 * s, cy + 10 * s, 32 * s, 15 * s, 0, 0, TAU);
    ctx.fill();
    ctx.restore();
  }

  function drawMountains(t) {
    const horizon = H * 0.58;

    for (let layer = 0; layer < 3; layer++) {
      const depth = layer + 1;
      const speed = 8 / depth;
      const offset = (t * speed) % (W * 0.7);
      const base = horizon - layer * H * 0.035;
      const amp = H * (0.12 - layer * 0.018);
      ctx.beginPath();
      ctx.moveTo(-W, base + amp);
      for (let x = -W - offset; x < W * 2; x += W * 0.18) {
        const peakX = x + W * 0.09;
        const peakY = base - amp * (0.42 + 0.38 * sin(x * 0.009 + layer));
        ctx.lineTo(peakX, peakY);
        ctx.lineTo(x + W * 0.18, base + amp * 0.25);
      }
      ctx.lineTo(W * 2, H);
      ctx.lineTo(-W, H);
      ctx.closePath();
      ctx.fillStyle = layer === 0 ? "#6aa184" : layer === 1 ? "#7eb292" : "#98c4a7";
      ctx.globalAlpha = layer === 0 ? 0.55 : layer === 1 ? 0.45 : 0.38;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawCity(t) {
    const base = H * 0.54;
    const speed = 18;
    const blockW = 82;
    const offset = (t * speed) % blockW;

    ctx.save();
    ctx.globalAlpha = 0.5;
    for (let x = -blockW - offset; x < W + blockW; x += blockW) {
      const h = H * (0.09 + 0.08 * ((Math.abs(Math.sin(x * 12.9898)) * 43758.5453) % 1));
      const w = blockW * (0.45 + 0.3 * ((Math.abs(Math.sin(x * 4.11)) * 999) % 1));
      ctx.fillStyle = "#5c8da0";
      roundedRect(x, base - h, w, h, 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,240,170,0.6)";
      const cols = Math.max(2, Math.floor(w / 15));
      for (let i = 1; i < cols; i++) {
        for (let j = 1; j < 5; j++) {
          const wx = x + i * (w / cols) - 3;
          const wy = base - h + j * 16;
          if (wy < base - 9 && (i + j + Math.floor(x)) % 3 !== 0) {
            ctx.fillRect(wx, wy, 5, 6);
          }
        }
      }
    }
    ctx.restore();
  }

  function drawTree(x, ground, s, sway) {
    ctx.save();
    ctx.translate(x, ground);

    ctx.fillStyle = "#69442d";
    ctx.beginPath();
    ctx.moveTo(-7 * s, 0);
    ctx.bezierCurveTo(-4 * s, -42 * s, -3 * s, -76 * s, sway * 5 * s, -112 * s);
    ctx.bezierCurveTo(8 * s, -76 * s, 8 * s, -38 * s, 7 * s, 0);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(60,35,22,0.25)";
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(0, -25 * s);
    ctx.quadraticCurveTo(-12 * s, -58 * s, -2 * s + sway * 6 * s, -103 * s);
    ctx.stroke();

    const greens = ["#2d7b47", "#3d9a56", "#27713e", "#56a85f"];
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = greens[i % greens.length];
      ctx.beginPath();
      const ox = (i - 2) * 18 * s + sway * (10 + i * 3) * s;
      const oy = -112 * s + (i % 2) * 16 * s;
      ctx.ellipse(ox, oy, (36 - i * 2) * s, (42 - i) * s, 0.2 * (i - 2), 0, TAU);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawEnvironment(t) {
    drawGradientSky();

    for (let i = 0; i < 7; i++) {
      const s = 0.55 + (i % 4) * 0.18;
      const x = ((i * W * 0.23 - t * (12 + i * 3)) % (W + 220)) - 120;
      const y = H * (0.12 + (i % 3) * 0.07);
      drawCloud(x, y, s, 0.58);
    }

    drawMountains(t);
    drawCity(t);

    const grassY = H * 0.62;
    const grassG = ctx.createLinearGradient(0, grassY, 0, H);
    grassG.addColorStop(0, "#84bd61");
    grassG.addColorStop(1, "#4d8b4a");
    ctx.fillStyle = grassG;
    ctx.fillRect(0, grassY, W, H - grassY);

    const treeSpacing = 180;
    const treeOffsetFar = (t * 62) % treeSpacing;
    for (let x = -treeSpacing - treeOffsetFar; x < W + treeSpacing; x += treeSpacing) {
      const idx = Math.floor((x + treeOffsetFar) / treeSpacing);
      const s = 0.55 + 0.22 * ((Math.sin(idx * 19.17) + 1) / 2);
      drawTree(x + 30 * sin(idx), grassY + 10, s, sin(t * 1.2 + idx) * 0.18);
    }

    const roadTop = H * 0.63;
    const roadBot = H;
    ctx.beginPath();
    ctx.moveTo(W * 0.16, roadBot);
    ctx.lineTo(W * 0.39, roadTop);
    ctx.quadraticCurveTo(W * 0.5, roadTop - 9, W * 0.61, roadTop);
    ctx.lineTo(W * 0.84, roadBot);
    ctx.closePath();

    const roadG = ctx.createLinearGradient(0, roadTop, 0, roadBot);
    roadG.addColorStop(0, "#777a7f");
    roadG.addColorStop(1, "#34363a");
    ctx.fillStyle = roadG;
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W * 0.39, roadTop);
    ctx.lineTo(W * 0.16, roadBot);
    ctx.moveTo(W * 0.61, roadTop);
    ctx.lineTo(W * 0.84, roadBot);
    ctx.stroke();

    const laneSpeed = 360;
    const stripeCount = 13;
    for (let i = 0; i < stripeCount; i++) {
      let p = ((i / stripeCount + (t * laneSpeed * 0.00055)) % 1);
      p = p * p;
      const y = lerp(roadTop + 10, roadBot + 80, p);
      const scale = lerp(0.12, 1.95, p);
      const cx = W * 0.5 + sin(t * 0.8 + p * 2) * 7 * p;
      ctx.save();
      ctx.translate(cx, y);
      ctx.scale(scale, scale);
      roundedRect(-4, -32, 8, 64, 4);
      ctx.fillStyle = "rgba(255,230,130,0.95)";
      ctx.fill();
      ctx.restore();
    }

    const pebbleOffset = (t * 560) % 80;
    for (let i = 0; i < 70; i++) {
      const seed = i * 123.456;
      const side = sin(seed) > 0 ? 1 : -1;
      const p = ((i * 0.137 + t * 0.72) % 1);
      const y = lerp(roadTop + 6, H + 20, p * p);
      const edge = side > 0 ? lerp(W * 0.62, W * 0.94, p) : lerp(W * 0.38, W * 0.06, p);
      const x = edge + sin(seed * 2.1) * 24 * p;
      const r = lerp(0.8, 3.2, p);
      ctx.fillStyle = side > 0 ? "rgba(40,65,38,0.28)" : "rgba(42,70,40,0.25)";
      ctx.beginPath();
      ctx.arc(x, y + pebbleOffset * 0.01, r, 0, TAU);
      ctx.fill();
    }

    const nearTreeSpacing = 250;
    const nearOffset = (t * 165) % nearTreeSpacing;
    for (let x = -nearTreeSpacing - nearOffset; x < W + nearTreeSpacing; x += nearTreeSpacing) {
      const idx = Math.floor((x + nearOffset) / nearTreeSpacing);
      const side = idx % 2 ? 1 : -1;
      const px = side > 0 ? x + W * 0.83 : x - W * 0.08;
      const s = 1.05 + 0.36 * ((sin(idx * 5.7) + 1) / 2);
      drawTree(px, H * 0.81, s, sin(t * 1.8 + idx) * 0.2);
    }

    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.beginPath();
    ctx.ellipse(W * 0.47, H * 0.91, W * 0.19, H * 0.028, 0, 0, TAU);
    ctx.fill();
  }

  function joint(parent, len, angle) {
    return {
      x: parent.x + cos(angle) * len,
      y: parent.y + sin(angle) * len
    };
  }

  function limb(a, b, w, color, hi) {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();

    if (hi) {
      ctx.strokeStyle = hi;
      ctx.lineWidth = Math.max(1, w * 0.18);
      ctx.beginPath();
      ctx.moveTo(a.x - w * 0.12, a.y - w * 0.08);
      ctx.lineTo(b.x - w * 0.12, b.y - w * 0.08);
      ctx.stroke();
    }
  }

  function drawShoe(x, y, angle, s, flip, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(flip, 1);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-11 * s, -4 * s);
    ctx.quadraticCurveTo(5 * s, -10 * s, 22 * s, -3 * s);
    ctx.quadraticCurveTo(26 * s, 4 * s, 15 * s, 7 * s);
    ctx.lineTo(-13 * s, 6 * s);
    ctx.quadraticCurveTo(-19 * s, 2 * s, -11 * s, -4 * s);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.38)";
    ctx.lineWidth = 1.2 * s;
    ctx.beginPath();
    ctx.moveTo(0, -3 * s);
    ctx.lineTo(12 * s, -1 * s);
    ctx.stroke();
    ctx.restore();
  }

  function drawHand(x, y, s, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, 7.5 * s, 6.3 * s, 0.1, 0, TAU);
    ctx.fill();
    ctx.strokeStyle = "rgba(92,45,25,0.25)";
    ctx.lineWidth = 1 * s;
    ctx.stroke();
  }

  function drawPerson(t) {
    const baseScale = Math.min(W, H) / 720;
    const s = clamp(baseScale * 1.05, 0.72, 1.32);
    const ground = H * 0.83;
    const x = W * 0.43 + sin(t * 1.35) * 7 * s;
    const bob = sin(t * 11.4) * 3.4 * s;
    const lean = -0.15 + sin(t * 5.7) * 0.035;
    const stride = t * 11.4;

    ctx.save();
    ctx.translate(x, ground + bob);

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(0, 9 * s, 58 * s, 11 * s, 0, 0, TAU);
    ctx.fill();

    const hip = { x: 0, y: -104 * s };
    const chest = { x: -15 * s, y: -224 * s };
    const neck = { x: -20 * s, y: -284 * s };

    const legA = sin(stride);
    const legB = sin(stride + Math.PI);

    const skin = "#b9794c";
    const skinHi = "#d69a69";
    const pantsDark = "#24324d";
    const pantsLight = "#2d4166";
    const jacket = "#d44734";
    const jacketDark = "#a32f2a";
    const shirt = "#f7f1df";

    function drawLeg(phase, behind) {
      const thighAng = Math.PI / 2 + 0.42 * sin(stride + phase) + 0.08;
      const kneeBend = 0.58 + 0.48 * Math.max(0, -sin(stride + phase + 0.65));
      const shinAng = thighAng - 0.48 * sin(stride + phase + 0.9) + kneeBend * 0.32;
      const hipJ = {
        x: hip.x + (phase === 0 ? -11 : 13) * s,
        y: hip.y
      };
      const knee = joint(hipJ, 72 * s, thighAng);
      const ankle = joint(knee, 74 * s, shinAng);
      const col = behind ? pantsDark : pantsLight;
      limb(hipJ, knee, 22 * s, col, "rgba(255,255,255,0.08)");
      limb(knee, ankle, 18 * s, col, "rgba(255,255,255,0.08)");

      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath();
      ctx.arc(knee.x, knee.y, 8 * s, 0, TAU);
      ctx.fill();

      const footAng = -0.14 + 0.3 * sin(stride + phase + 1.2);
      drawShoe(ankle.x + 5 * s, ankle.y + 5 * s, footAng, s, 1, behind ? "#1a1d24" : "#232735");
    }

    if (legA > legB) {
      drawLeg(Math.PI, true);
      drawLeg(0, false);
    } else {
      drawLeg(0, true);
      drawLeg(Math.PI, false);
    }

    ctx.save();
    ctx.translate(chest.x, chest.y);
    ctx.rotate(lean);

    ctx.fillStyle = jacketDark;
    ctx.beginPath();
    ctx.moveTo(-36 * s, -16 * s);
    ctx.bezierCurveTo(-56 * s, 22 * s, -50 * s, 80 * s, -28 * s, 104 * s);
    ctx.lineTo(26 * s, 100 * s);
    ctx.bezierCurveTo(45 * s, 60 * s, 42 * s, 14 * s, 22 * s, -22 * s);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = jacket;
    ctx.beginPath();
    ctx.moveTo(-31 * s, -24 * s);
    ctx.bezierCurveTo(-54 * s, 20 * s, -44 * s, 82 * s, -18 * s, 109 * s);
    ctx.lineTo(33 * s, 98 * s);
    ctx.bezierCurveTo(46 * s, 50 * s, 34 * s, 3 * s, 12 * s, -24 * s);
    ctx.bezierCurveTo(-2 * s, -35 * s, -19 * s, -34 * s, -31 * s, -24 * s);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = shirt;
    ctx.beginPath();
    ctx.moveTo(-11 * s, -19 * s);
    ctx.lineTo(18 * s, -11 * s);
    ctx.lineTo(10 * s, 92 * s);
    ctx.lineTo(-16 * s, 100 * s);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(-31 * s, -9 * s);
    ctx.bezierCurveTo(-38 * s, 30 * s, -32 * s, 76 * s, -12 * s, 104 * s);
    ctx.stroke();

    ctx.strokeStyle = "rgba(70,0,0,0.18)";
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(13 * s, -6 * s);
    ctx.bezierCurveTo(28 * s, 31 * s, 25 * s, 72 * s, 17 * s, 97 * s);
    ctx.stroke();

    ctx.restore();

    function arm(phase, behind) {
      const shoulder = {
        x: chest.x + (phase === 0 ? 17 : -41) * s,
        y: chest.y - 6 * s
      };
      const swing = sin(stride + phase);
      const upperAng = Math.PI / 2 + (phase === 0 ? -0.55 : 0.55) * swing + 0.12;
      const elbow = joint(shoulder, 58 * s, upperAng);
      const foreAng = upperAng + 0.45 + 0.36 * sin(stride + phase + 1.2);
      const hand = joint(elbow, 52 * s, foreAng);

      limb(shoulder, elbow, behind ? 15 * s : 17 * s, behind ? jacketDark : jacket, "rgba(255,255,255,0.11)");
      limb(elbow, hand, behind ? 13 * s : 15 * s, behind ? jacketDark : jacket, "rgba(255,255,255,0.08)");

      const wrist = joint(elbow, 55 * s, foreAng);
      limb(hand, wrist, 8 * s, skin, skinHi);
      drawHand(wrist.x, wrist.y, s, skin);
      return wrist;
    }

    let leashHand;
    if (sin(stride) > 0) {
      arm(Math.PI, true);
      leashHand = arm(0, false);
    } else {
      leashHand = arm(0, true);
      arm(Math.PI, false);
    }

    ctx.save();
    ctx.translate(neck.x, neck.y);
    ctx.rotate(-0.1 + sin(stride) * 0.025);

    ctx.fillStyle = skin;
    roundedRect(-12 * s, -2 * s, 24 * s, 30 * s, 9 * s);
    ctx.fill();

    ctx.fillStyle = "#2b1c16";
    ctx.beginPath();
    ctx.ellipse(-3 * s, -33 * s, 31 * s, 37 * s, -0.06, 0, TAU);
    ctx.fill();

    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.ellipse(-1 * s, -31 * s, 27 * s, 32 * s, -0.03, 0, TAU);
    ctx.fill();

    ctx.fillStyle = "#2b1c16";
    ctx.beginPath();
    ctx.moveTo(-29 * s, -37 * s);
    ctx.bezierCurveTo(-24 * s, -66 * s, 19 * s, -68 * s, 28 * s, -34 * s);
    ctx.bezierCurveTo(14 * s, -48 * s, -8 * s, -46 * s, -29 * s, -37 * s);
    ctx.fill();

    ctx.fillStyle = "rgba(255,210,170,0.32)";
    ctx.beginPath();
    ctx.ellipse(9 * s, -26 * s, 7 * s, 13 * s, -0.15, 0, TAU);
    ctx.fill();

    ctx.fillStyle = "#251715";
    ctx.beginPath();
    ctx.ellipse(-10 * s, -34 * s, 2.5 * s, 2.8 * s, 0, 0, TAU);
    ctx.ellipse(9 * s, -35 * s, 2.5 * s, 2.8 * s, 0, 0, TAU);
    ctx.fill();

    ctx.strokeStyle = "#663a2a";
    ctx.lineWidth = 1.4 * s;
    ctx.beginPath();
    ctx.moveTo(-1 * s, -31 * s);
    ctx.quadraticCurveTo(3 * s, -24 * s, -3 * s, -20 * s);
    ctx.stroke();

    ctx.strokeStyle = "rgba(72,32,22,0.65)";
    ctx.lineWidth = 1.7 * s;
    ctx.beginPath();
    ctx.moveTo(-8 * s, -13 * s);
    ctx.quadraticCurveTo(0, -9 * s, 9 * s, -14 * s);
    ctx.stroke();

    ctx.restore();

    ctx.restore();

    return {
      hand: {
        x: x + leashHand.x,
        y: ground + bob + leashHand.y
      }
    };
  }

  function drawDog(t) {
    const baseScale = Math.min(W, H) / 720;
    const s = clamp(baseScale * 0.92, 0.66, 1.18);
    const ground = H * 0.858;
    const x = W * 0.61 + sin(t * 3.2) * 11 * s;
    const bodyY = ground - 55 * s + sin(t * 15.2) * 2.8 * s;
    const pace = t * 15.2;

    ctx.save();
    ctx.translate(x, bodyY);

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.beginPath();
    ctx.ellipse(-5 * s, 61 * s, 72 * s, 10 * s, 0, 0, TAU);
    ctx.fill();

    const fur = "#9b633b";
    const furDark = "#714224";
    const furLight = "#bd8050";
    const collar = "#1c9aa2";

    const bodyTilt = sin(pace * 0.5) * 0.035;

    ctx.save();
    ctx.rotate(bodyTilt);

    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(-13 * s, 1 * s, 63 * s, 33 * s, -0.04, 0, TAU);
    ctx.fill();

    ctx.fillStyle = fur;
    ctx.beginPath();
    ctx.ellipse(-17 * s, -4 * s, 61 * s, 34 * s, -0.03, 0, TAU);
    ctx.fill();

    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(-17 * s, -2 * s, 44 * s, 20 * s, -0.06, 0, TAU);
    ctx.fill();

    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(-69 * s, -5 * s);
    ctx.bezierCurveTo(-93 * s, -27 * s, -99 * s, -47 * s, -84 * s, -60 * s);
    ctx.bezierCurveTo(-58 * s, -48 * s, -51 * s, -24 * s, -55 * s, -9 * s);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = furDark;
    ctx.lineWidth = 13 * s;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-70 * s, -5 * s);
    ctx.bezierCurveTo(-99 * s, -30 * s, -95 * s, -55 * s, -79 * s, -65 * s);
    ctx.stroke();

    ctx.restore();

    const legOrigins = [
      { x: -52 * s, y: 17 * s, ph: 0, back: true },
      { x: -27 * s, y: 21 * s, ph: Math.PI, back: false },
      { x: 21 * s, y: 18 * s, ph: Math.PI, back: true },
      { x: 46 * s, y: 17 * s, ph: 0, back: false }
    ];

    function dogLeg(o) {
      const swing = sin(pace + o.ph);
      const lift = Math.max(0, -swing);
      const hip = { x: o.x, y: o.y };
      const kneeAng = Math.PI / 2 + 0.5 * swing;
      const knee = joint(hip, 28 * s, kneeAng);
      const ankleAng = Math.PI / 2 - 0.45 * swing + lift * 0.5;
      const paw = joint(knee, 28 * s, ankleAng);
      paw.y -= lift * 6 * s;
      limb(hip, knee, o.back ? 9 * s : 10 * s, o.back ? furDark : fur, "rgba(255,255,255,0.08)");
      limb(knee, paw, o.back ? 7 * s : 8 * s, o.back ? furDark : fur, "rgba(255,255,255,0.08)");

      ctx.fillStyle = o.back ? "#5a321d" : "#6d3d22";
      ctx.beginPath();
      ctx.ellipse(paw.x + 5 * s, paw.y + 3 * s, 11 * s, 5 * s, -0.05, 0, TAU);
      ctx.fill();
    }

    legOrigins.sort((a, b) => a.back - b.back).forEach(dogLeg);

    const neck = { x: 48 * s, y: -18 * s };
    ctx.save();
    ctx.translate(neck.x, neck.y);
    ctx.rotate(-0.15 + sin(pace) * 0.045);

    ctx.fillStyle = fur;
    ctx.beginPath();
    ctx.ellipse(28 * s, -3 * s, 32 * s, 24 * s, 0.1, 0, TAU);
    ctx.fill();

    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(39 * s, 2 * s, 18 * s, 15 * s, 0.08, 0, TAU);
    ctx.fill();

    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(9 * s, -18 * s);
    ctx.bezierCurveTo(3 * s, -57 * s, 28 * s, -46 * s, 27 * s, -21 * s);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(39 * s, -17 * s);
    ctx.bezierCurveTo(42 * s, -50 * s, 65 * s, -40 * s, 59 * s, -10 * s);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#21120d";
    ctx.beginPath();
    ctx.ellipse(53 * s, -2 * s, 5 * s, 4 * s, 0.1, 0, TAU);
    ctx.fill();

    ctx.fillStyle = "#1d100b";
    ctx.beginPath();
    ctx.ellipse(31 * s, -9 * s, 2.4 * s, 3.1 * s, 0, 0, TAU);
    ctx.fill();

    ctx.strokeStyle = "rgba(65,35,20,0.65)";
    ctx.lineWidth = 1.4 * s;
    ctx.beginPath();
    ctx.moveTo(42 * s, 5 * s);
    ctx.quadraticCurveTo(36 * s, 12 * s, 28 * s, 9 * s);
    ctx.stroke();

    ctx.strokeStyle = collar;
    ctx.lineWidth = 7 * s;
    ctx.beginPath();
    ctx.moveTo(5 * s, 10 * s);
    ctx.quadraticCurveTo(20 * s, 20 * s, 39 * s, 13 * s);
    ctx.stroke();

    ctx.fillStyle = "#f2d24b";
    ctx.beginPath();
    ctx.arc(32 * s, 17 * s, 4.5 * s, 0, TAU);
    ctx.fill();

    ctx.restore();

    return {
      collar: {
        x: x + neck.x + 53 * s,
        y: bodyY + neck.y + 13 * s
      }
    };
  }

  function drawLeash(hand, collar, t) {
    const dx = collar.x - hand.x;
    const dy = collar.y - hand.y;
    const dist = Math.hypot(dx, dy);
    const sag = clamp(dist * 0.1, 18, 55) + sin(t * 8.5) * 4;
    const pull = sin(t * 5.2) * 10;

    const c1 = {
      x: hand.x + dx * 0.34 + pull,
      y: hand.y + dy * 0.34 + sag
    };
    const c2 = {
      x: hand.x + dx * 0.68 - pull * 0.4,
      y: hand.y + dy * 0.68 + sag * 0.6
    };

    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.strokeStyle = "rgba(28,23,18,0.35)";
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y);
    ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, collar.x, collar.y);
    ctx.stroke();

    ctx.strokeStyle = "#30231a";
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y);
    ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, collar.x, collar.y);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(hand.x, hand.y - 1.5);
    ctx.bezierCurveTo(c1.x, c1.y - 1.5, c2.x, c2.y - 1.5, collar.x, collar.y - 1.5);
    ctx.stroke();

    ctx.fillStyle = "#30231a";
    ctx.beginPath();
    ctx.arc(hand.x, hand.y, 4.3, 0, TAU);
    ctx.arc(collar.x, collar.y, 3.8, 0, TAU);
    ctx.fill();
  }

  function drawSpeedStreaks(t) {
    const n = 35;
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = "#ffffff";
    ctx.lineCap = "round";
    for (let i = 0; i < n; i++) {
      const seed = i * 79.13;
      const y = H * (0.68 + 0.28 * ((sin(seed) + 1) * 0.5));
      const x = ((i * 113 - t * 430) % (W + 260)) - 180;
      const len = 30 + 70 * ((sin(seed * 2.4) + 1) * 0.5);
      const fade = clamp((y - H * 0.68) / (H * 0.28), 0, 1);
      ctx.lineWidth = lerp(0.6, 2.2, fade);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + len, y + 2 * sin(seed));
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawForegroundGrass(t) {
    const speed = 520;
    const spacing = 42;
    const off = (t * speed) % spacing;

    for (let x = -spacing - off; x < W + spacing; x += spacing) {
      const idx = Math.floor((x + off) / spacing);
      const side = sin(idx * 4.7) > 0 ? 1 : -1;
      const baseX = side > 0 ? x + W * 0.76 : x - W * 0.06;
      const baseY = H * (0.87 + 0.1 * ((sin(idx * 2.13) + 1) * 0.5));
      const blades = 4 + (idx % 4);

      ctx.strokeStyle = "rgba(37,92,39,0.58)";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";

      for (let b = 0; b < blades; b++) {
        const h = 16 + 18 * ((sin(idx * 8.3 + b) + 1) * 0.5);
        const lean = (b - blades / 2) * 4 + sin(t * 3 + idx) * 2;
        ctx.beginPath();
        ctx.moveTo(baseX + b * 4, baseY);
        ctx.quadraticCurveTo(baseX + lean, baseY - h * 0.55, baseX + lean * 1.5, baseY - h);
        ctx.stroke();
      }
    }
  }

  function vignette() {
    const g = ctx.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.2, W * 0.5, H * 0.5, Math.max(W, H) * 0.72);
    g.addColorStop(0, "rgba(255,255,255,0)");
    g.addColorStop(0.72, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.24)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    time += dt;

    ctx.clearRect(0, 0, W, H);

    drawEnvironment(time);
    drawSpeedStreaks(time);

    const dog = drawDog(time);
    const person = drawPerson(time);
    drawLeash(person.hand, dog.collar, time);

    drawForegroundGrass(time);
    vignette();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
