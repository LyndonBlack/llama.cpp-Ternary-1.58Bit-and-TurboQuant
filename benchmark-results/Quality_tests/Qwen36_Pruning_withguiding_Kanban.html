<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS RESET & BASE
   ============================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: rgba(30, 33, 45, 0.7);
  --bg-card-hover: rgba(40, 44, 60, 0.85);
  --border-color: rgba(255, 255, 255, 0.08);
  --border-hover: rgba(255, 255, 255, 0.15);
  --text-primary: #e4e6f0;
  --text-secondary: #8b8fa3;
  --text-muted: #5a5e72;
  --accent-blue: #6c8cff;
  --accent-purple: #a78bfa;
  --priority-low: #22c55e;
  --priority-low-bg: rgba(34, 197, 94, 0.12);
  --priority-medium: #f59e0b;
  --priority-medium-bg: rgba(245, 158, 11, 0.12);
  --priority-high: #ef4444;
  --priority-high-bg: rgba(239, 68, 68, 0.12);
  --column-bg: rgba(22, 25, 36, 0.6);
  --column-border: rgba(255, 255, 255, 0.06);
  --drop-highlight: rgba(108, 140, 255, 0.15);
  --drop-border: rgba(108, 140, 255, 0.5);
  --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --transition-fast: 0.15s ease;
  --transition-med: 0.25s ease;
  --transition-slow: 0.4s ease;
}

html, body {
  height: 100%;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   FILTER BAR & HEADER
   ============================================ */
#filter-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  background: rgba(15, 17, 23, 0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-color);
}

#filter-bar h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

#search-input {
  flex: 1;
  max-width: 320px;
  padding: 8px 14px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition-fast);
}

#search-input::placeholder {
  color: var(--text-muted);
}

#search-input:focus {
  border-color: var(--accent-blue);
}

#priority-filter {
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition-fast);
}

#priority-filter:focus {
  border-color: var(--accent-blue);
}

/* ============================================
   BOARD AREA
   ============================================ */
#board {
  display: flex;
  gap: 18px;
  padding: 20px 24px;
  overflow-x: auto;
  overflow-y: hidden;
  height: calc(100vh - 53px - 52px);
  scroll-behavior: smooth;
  align-items: flex-start;
}

#board::-webkit-scrollbar {
  height: 8px;
}

#board::-webkit-scrollbar-track {
  background: transparent;
}

#board::-webkit-scrollbar-thumb {
  background: var(--text-muted);
  border-radius: 4px;
}

#board::-webkit-scrollbar-thumb:hover {
  background: var(--text-secondary);
}

/* ============================================
   COLUMNS
   ============================================ */
.column {
  flex-shrink: 0;
  width: 310px;
  min-width: 280px;
  max-height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--column-bg);
  border: 1px solid var(--column-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  overflow: hidden;
}

.column.drag-over {
  border-color: var(--drop-border);
  background: var(--drop-highlight);
  box-shadow: var(--shadow-glass), 0 0 20px rgba(108, 140, 255, 0.1);
}

.column.drag-over .column-cards {
  animation: pulse-drop 1.2s ease-in-out infinite;
}

@keyframes pulse-drop {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  user-select: none;
}

.column-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  padding: 3px 6px;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
  position: relative;
}

.column-title:hover {
  background: rgba(255, 255, 255, 0.05);
}

.column-title[contenteditable="true"] {
  background: var(--bg-secondary);
  outline: 1px solid var(--accent-blue);
  cursor: text;
}

.column-title .rename-hint {
  display: none;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 6px;
  vertical-align: middle;
}

.column-title:hover .rename-hint {
  display: inline;
}

.column-header-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.column:hover .column-header-actions {
  opacity: 1;
}

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 16px;
  transition: all var(--transition-fast);
}

.btn-icon:hover {
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-primary);
}

.btn-icon.delete-col:hover {
  background: var(--priority-high-bg);
  color: var(--priority-high);
}

/* ============================================
   ADD COLUMN BUTTON
   ============================================ */
.add-column-btn {
  flex-shrink: 0;
  width: 260px;
  min-width: 260px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 2px dashed var(--border-color);
  border-radius: var(--radius-lg);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.add-column-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(108, 140, 255, 0.05);
}

/* ============================================
   CARD LIST AREA
   ============================================ */
.column-cards {
  flex: 1;
  overflow-y: auto;
  padding: 4px 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.column-cards::-webkit-scrollbar {
  width: 4px;
}

.column-cards::-webkit-scrollbar-track {
  background: transparent;
}

.column-cards::-webkit-scrollbar-thumb {
  background: var(--text-muted);
  border-radius: 2px;
}

/* ============================================
   CARDS
   ============================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  cursor: grab;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast), opacity var(--transition-med), background var(--transition-fast);
  position: relative;
}

.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
  transform: translateY(-1px);
}

.card.dragging {
  opacity: 0.4;
  transform: rotate(2deg) scale(0.97);
  cursor: grabbing;
}

.card.fade-out {
  opacity: 0;
  transform: scale(0.95) translateY(-8px);
  transition: all 0.35s ease;
}

.card.done-card {
  opacity: 0.55;
}

.card.done-card .card-title {
  text-decoration: line-through;
  color: var(--text-muted);
}

.card.hidden-filter {
  visibility: hidden;
  pointer-events: none;
  position: absolute;
}

.card.hidden-filter .card-placeholder {
  display: block;
}

.card-placeholder {
  display: none;
  height: 68px;
  border: 1px dashed var(--border-color);
  border-radius: var(--radius-md);
}

.card-title {
  font-size: 13.5px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--text-primary);
  margin-bottom: 8px;
  word-break: break-word;
}

.card-description {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 8px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
  max-height: 36px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.card-description:hover {
  background: rgba(255, 255, 255, 0.04);
}

.card-description.expanded {
  max-height: none;
  -webkit-line-clamp: unset;
}

.card-description::before {
  content: '↳ ';
  color: var(--text-muted);
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.priority-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  text-transform: uppercase;
}

.priority-badge.low {
  color: var(--priority-low);
  background: var(--priority-low-bg);
}

.priority-badge.medium {
  color: var(--priority-medium);
  background: var(--priority-medium-bg);
}

.priority-badge.high {
  color: var(--priority-high);
  background: var(--priority-high-bg);
}

.due-date {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11.5px;
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.04);
}

.due-date.overdue {
  color: var(--priority-high);
  background: var(--priority-high-bg);
  font-weight: 500;
}

.due-date.overdue::before {
  content: '⚠️';
  font-size: 12px;
}

.card-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.card:hover .card-actions {
  opacity: 1;
}

.card-actions .btn-icon {
  width: 24px;
  height: 24px;
  font-size: 13px;
}

/* ============================================
   ADD CARD BUTTON
   ============================================ */
.add-card-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border-color);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  margin-top: 2px;
}

.add-card-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: rgba(108, 140, 255, 0.05);
}

/* ============================================
   INLINE ADD CARD FORM
   ============================================ */
.card-form {
  background: var(--bg-card);
  border: 1px solid var(--accent-blue);
  border-radius: var(--radius-md);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 0 20px rgba(108, 140, 255, 0.1);
  animation: form-fade-in 0.2s ease;
}

@keyframes form-fade-in {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-form input[type="text"],
.card-form input[type="date"],
.card-form textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition-fast);
}

.card-form input[type="text"]:focus,
.card-form input[type="date"]:focus,
.card-form textarea:focus {
  border-color: var(--accent-blue);
}

.card-form input[type="text"]::placeholder,
.card-form textarea::placeholder {
  color: var(--text-muted);
}

.card-form textarea {
  resize: vertical;
  min-height: 56px;
  max-height: 120px;
}

.form-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.form-row label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
  white-space: nowrap;
}

.form-row select {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

.form-row select:focus {
  border-color: var(--accent-blue);
}

.card-form .form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 2px;
}

.btn-save {
  padding: 6px 16px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent-blue);
  color: #fff;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition-fast), transform var(--transition-fast);
}

.btn-save:hover {
  background: #5a7aee;
  transform: translateY(-1px);
}

.btn-cancel {
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-cancel:hover {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
}

/* ============================================
   STATISTICS BAR
   ============================================ */
#stats-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 0 24px;
  background: rgba(15, 17, 23, 0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border-color);
  z-index: 100;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}

.stat-value {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
}

.stat-item.done-stat .stat-value {
  color: var(--priority-low);
}

.stat-item.overdue-stat .stat-value {
  color: var(--priority-high);
}

.stat-item.completion-stat .stat-value {
  color: var(--accent-blue);
}

.stat-divider {
  width: 1px;
  height: 24px;
  background: var(--border-color);
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  #filter-bar {
    padding: 10px 14px;
    gap: 8px;
    flex-wrap: wrap;
  }

  #filter-bar h1 {
    font-size: 15px;
  }

  #search-input {
    max-width: 200px;
  }

  #board {
    padding: 14px;
    gap: 14px;
  }

  .column {
    width: 280px;
    min-width: 260px;
  }

  #stats-bar {
    gap: 16px;
    font-size: 12px;
  }

  .stat-divider {
    display: none;
  }
}

@media (max-width: 480px) {
  #stats-bar {
    gap: 10px;
    padding: 0 10px;
    height: 48px;
  }

  .stat-item {
    font-size: 11px;
  }

  .stat-value {
    font-size: 13px;
  }
}
</style>
</head>
<body>

<!-- ============================================
     FILTER BAR
     ============================================ -->
<div id="filter-bar">
  <h1>📋 Kanban Board</h1>
  <input type="text" id="search-input" placeholder="🔍  Search cards..." autocomplete="off">
  <select id="priority-filter">
    <option value="all">All Priorities</option>
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>
</div>

<!-- ============================================
     BOARD
     ============================================ -->
<div id="board"></div>

<!-- ============================================
     STATISTICS BAR
     ============================================ -->
<div id="stats-bar">
  <div class="stat-item">
    <span>Total cards:</span>
    <span class="stat-value" id="stat-total">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item overdue-stat">
    <span>Overdue:</span>
    <span class="stat-value" id="stat-overdue">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item done-stat">
    <span>Done:</span>
    <span class="stat-value" id="stat-done">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item completion-stat">
    <span>Completion:</span>
    <span class="stat-value" id="stat-completion">0%</span>
  </div>
</div>

<script>
/* ============================================
   STATE MANAGEMENT
   ============================================ */

/**
 * Generate a unique ID for cards and columns
 */
function uid() {
  return 'id_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
}

/**
 * Default columns structure
 */
function getDefaultColumns() {
  return [
    { id: uid(), title: 'Backlog', cards: [] },
    { id: uid(), title: 'To Do', cards: [] },
    { id: uid(), title: 'In Progress', cards: [] },
    { id: uid(), title: 'Done', cards: [] }
  ];
}

/**
 * Example cards to seed the board on first load
 */
function getExampleCards() {
  return [
    { id: uid(), title: 'Research competitor features', description: 'Analyze top 5 competitors and document their key features in a comparison table.', priority: 'Low', dueDate: '', done: false },
    { id: uid(), title: 'Design new landing page', description: 'Create wireframes and high-fidelity mockups for the redesigned landing page.', priority: 'Medium', dueDate: '', done: false },
    { id: uid(), title: 'Fix login page bug', description: 'Users report that the login form doesn\'t submit on mobile devices when using Safari.', priority: 'High', dueDate: new Date(Date.now() - 86400000).toISOString().split('T')[0], done: false },
    { id: uid(), title: 'Set up CI/CD pipeline', description: 'Configure GitHub Actions for automated testing and deployment.', priority: 'Medium', dueDate: new Date(Date.now() + 172800000).toISOString().split('T')[0], done: false },
    { id: uid(), title: 'Write API documentation', description: 'Document all REST endpoints with request/response examples.', priority: 'Low', dueDate: new Date(Date.now() + 259200000).toISOString().split('T')[0], done: false },
    { id: uid(), title: 'Update dependencies', description: 'Run npm audit and update all outdated packages.', priority: 'High', dueDate: new Date(Date.now() + 432000000).toISOString().split('T')[0], done: false }
  ];
}

/**
 * Spread example cards across columns
 */
function getInitialBoard() {
  const cols = getDefaultColumns();
  const exCards = getExampleCards();
  cols[0].cards.push(exCards[0], exCards[1]);
  cols[1].cards.push(exCards[2], exCards[3]);
  cols[2].cards.push(exCards[4]);
  cols[3].cards.push(exCards[5]);
  return cols;
}

/**
 * Main board state
 */
let boardState = [];
let draggedCardId = null;
let draggedFromColumnId = null;

/* ============================================
   PERSISTENCE (localStorage)
   ============================================ */

const STORAGE_KEY = 'kanban_board_state_v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(boardState));
  } catch (e) {
    console.warn('Failed to save state:', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) {
        return parsed;
      }
    }
  } catch (e) {
    console.warn('Failed to load state:', e);
  }
  return null;
}

/* ============================================
   UTILITY HELPERS
   ============================================ */

function isOverdue(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dateStr + 'T00:00:00');
  return due < today;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function getColumnById(colId) {
  return boardState.find(c => c.id === colId);
}

function getCardIndex(cardId, colId) {
  const col = getColumnById(colId);
  if (!col) return -1;
  return col.cards.findIndex(c => c.id === cardId);
}

/* ============================================
   RENDERING
   ============================================ */

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  boardState.forEach(col => {
    board.appendChild(createColumnElement(col));
  });

  // Add "Add Column" button
  const addColBtn = document.createElement('button');
  addColBtn.className = 'add-column-btn';
  addColBtn.innerHTML = '<span style="font-size:18px;">+</span> Add Column';
  addColBtn.addEventListener('click', addColumn);
  board.appendChild(addColBtn);

  applyFilters();
  updateStats();
}

/**
 * Create a column DOM element
 */
function createColumnElement(col) {
  const colEl = document.createElement('div');
  colEl.className = 'column';
  colEl.dataset.colId = col.id;

  // Column header
  const header = document.createElement('div');
  header.className = 'column-header';

  const titleEl = document.createElement('span');
  titleEl.className = 'column-title';
  titleEl.textContent = col.title;
  titleEl.title = 'Double-click to rename';

  titleEl.addEventListener('dblclick', () => {
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    // Select all text
    const range = document.createRange();
    range.selectNodeContents(titleEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });

  titleEl.addEventListener('blur', () => {
    titleEl.removeAttribute('contenteditable');
    const newTitle = titleEl.textContent.trim();
    if (newTitle) {
      col.title = newTitle;
    } else {
      titleEl.textContent = col.title; // revert
    }
    saveState();
  });

  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      titleEl.blur();
    }
    if (e.key === 'Escape') {
      titleEl.textContent = col.title;
      titleEl.blur();
    }
  });

  const actions = document.createElement('div');
  actions.className = 'column-header-actions';

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-icon delete-col';
  deleteBtn.title = 'Delete column';
  deleteBtn.innerHTML = '🗑';
  deleteBtn.addEventListener('click', () => {
    if (col.cards.length === 0 && boardState.length > 1) {
      boardState = boardState.filter(c => c.id !== col.id);
      saveState();
      renderBoard();
    }
  });

  actions.appendChild(deleteBtn);
  header.appendChild(titleEl);
  header.appendChild(actions);
  colEl.appendChild(header);

  // Cards container
  const cardsContainer = document.createElement('div');
  cardsContainer.className = 'column-cards';
  cardsContainer.dataset.colId = col.id;

  col.cards.forEach(card => {
    cardsContainer.appendChild(createCardElement(card, col.id));
  });

  colEl.appendChild(cardsContainer);

  // Add card button
  const addCardBtn = document.createElement('button');
  addCardBtn.className = 'add-card-btn';
  addCardBtn.innerHTML = '<span>+</span> Add card';
  addCardBtn.addEventListener('click', () => {
    showCardForm(col, addCardBtn);
  });
  colEl.appendChild(addCardBtn);

  // Drag & Drop events on column
  setupColumnDrop(col.id, colEl);

  return colEl;
}

/**
 * Create a card DOM element
 */
function createCardElement(card, colId) {
  const cardEl = document.createElement('div');
  cardEl.className = 'card';
  if (card.done) cardEl.classList.add('done-card');
  cardEl.dataset.cardId = card.id;
  cardEl.draggable = true;

  // Drag start
  cardEl.addEventListener('dragstart', (e) => {
    draggedCardId = card.id;
    draggedFromColumnId = colId;
    cardEl.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.id);
  });

  cardEl.addEventListener('dragend', () => {
    cardEl.classList.remove('dragging');
    draggedCardId = null;
    draggedFromColumnId = null;
    // Remove all drag-over highlights
    document.querySelectorAll('.column.drag-over').forEach(el => el.classList.remove('drag-over'));
  });

  // Card title
  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = card.title;

  // Description
  if (card.description) {
    const descEl = document.createElement('div');
    descEl.className = 'card-description';
    descEl.textContent = card.description;
    descEl.addEventListener('click', () => {
      descEl.classList.toggle('expanded');
    });
    cardEl.appendChild(descEl);
  }

  cardEl.appendChild(titleEl);

  // Meta: priority badge + due date
  const metaEl = document.createElement('div');
  metaEl.className = 'card-meta';

  // Priority badge
  const badge = document.createElement('span');
  badge.className = `priority-badge ${card.priority.toLowerCase()}`;
  badge.textContent = card.priority;
  metaEl.appendChild(badge);

  // Due date
  if (card.dueDate) {
    const dueEl = document.createElement('span');
    dueEl.className = 'due-date';
    if (isOverdue(card.dueDate) && !card.done) {
      dueEl.classList.add('overdue');
    }
    dueEl.textContent = formatDate(card.dueDate);
    metaEl.appendChild(dueEl);
  }

  cardEl.appendChild(metaEl);

  // Card actions (delete button)
  const actionsEl = document.createElement('div');
  actionsEl.className = 'card-actions';

  const deleteCardBtn = document.createElement('button');
  deleteCardBtn.className = 'btn-icon';
  deleteCardBtn.title = 'Delete card';
  deleteCardBtn.innerHTML = '✕';
  deleteCardBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    cardEl.classList.add('fade-out');
    setTimeout(() => {
      const col = getColumnById(colId);
      if (col) {
        col.cards = col.cards.filter(c => c.id !== card.id);
        saveState();
        renderBoard();
      }
    }, 350);
  });
  actionsEl.appendChild(deleteCardBtn);
  cardEl.appendChild(actionsEl);

  return cardEl;
}

/* ============================================
   INLINE CARD FORM
   ============================================ */

function showCardForm(column, anchorEl) {
  const cardsContainer = anchorEl.previousElementSibling;

  const form = document.createElement('div');
  form.className = 'card-form';

  form.innerHTML = `
    <input type="text" class="form-title" placeholder="Card title *" required>
    <div class="form-row">
      <label>Priority</label>
      <select class="form-priority">
        <option value="Low">Low</option>
        <option value="Medium" selected>Medium</option>
        <option value="High">High</option>
      </select>
      <label>Due</label>
      <input type="date" class="form-due">
    </div>
    <textarea class="form-desc" placeholder="Description (optional)"></textarea>
    <div class="form-actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-save">Save</button>
    </div>
  `;

  // Insert form before the add-card button
  anchorEl.parentNode.insertBefore(form, anchorEl);

  // Focus title input
  const titleInput = form.querySelector('.form-title');
  titleInput.focus();

  const cancelBtn = form.querySelector('.btn-cancel');
  const saveBtn = form.querySelector('.btn-save');

  cancelBtn.addEventListener('click', () => {
    form.remove();
  });

  saveBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    if (!title) {
      titleInput.style.borderColor = 'var(--priority-high)';
      titleInput.focus();
      return;
    }

    const priority = form.querySelector('.form-priority').value;
    const dueDate = form.querySelector('.form-due').value;
    const desc = form.querySelector('.form-desc').value.trim();

    const newCard = {
      id: uid(),
      title: title,
      description: desc,
      priority: priority,
      dueDate: dueDate,
      done: column.title === 'Done'
    };

    column.cards.push(newCard);
    saveState();

    // Remove form and re-render
    form.remove();
    renderBoard();
  });

  // Enter to save
  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      saveBtn.click();
    }
    if (e.key === 'Escape') {
      form.remove();
    }
  });
}

/* ============================================
   ADD COLUMN
   ============================================ */

function addColumn() {
  const col = { id: uid(), title: 'New Column', cards: [] };
  boardState.push(col);
  saveState();
  renderBoard();

  // Focus the new column title for renaming
  setTimeout(() => {
    const newCol = document.querySelector(`.column[data-col-id="${col.id}"]`);
    if (newCol) {
      const titleEl = newCol.querySelector('.column-title');
      titleEl.setAttribute('contenteditable', 'true');
      titleEl.focus();
      const range = document.createRange();
      range.selectNodeContents(titleEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  }, 50);
}

/* ============================================
   DRAG & DROP
   ============================================ */

/**
 * Set up drop zone events on a column
 */
function setupColumnDrop(colId, colEl) {
  const cardsContainer = colEl.querySelector('.column-cards');

  colEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    colEl.classList.add('drag-over');
  });

  colEl.addEventListener('dragleave', (e) => {
    // Only remove if actually leaving the column
    if (!colEl.contains(e.relatedTarget)) {
      colEl.classList.remove('drag-over');
    }
  });

  colEl.addEventListener('drop', (e) => {
    e.preventDefault();
    colEl.classList.remove('drag-over');

    if (!draggedCardId || !draggedFromColumnId) return;

    const targetCol = getColumnById(colId);
    if (!targetCol) return;

    const sourceCol = getColumnById(draggedFromColumnId);
    if (!sourceCol) return;

    // Find and remove card from source
    const cardIndex = sourceCol.cards.findIndex(c => c.id === draggedCardId);
    if (cardIndex === -1) return;

    const card = sourceCol.cards.splice(cardIndex, 1)[0];

    // Determine drop position based on mouse Y relative to cards in target column
    const cardEls = [...cardsContainer.querySelectorAll('.card:not(.dragging):not(.hidden-filter)')];
    let insertIndex = targetCol.cards.length;

    for (let i = 0; i < cardEls.length; i++) {
      const rect = cardEls[i].getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) {
        insertIndex = i;
        break;
      }
    }

    targetCol.cards.splice(insertIndex, 0, card);

    // Auto-mark as done if moved to Done column
    if (targetCol.title === 'Done') {
      card.done = true;
    } else {
      card.done = false;
    }

    draggedCardId = null;
    draggedFromColumnId = null;
    saveState();
    renderBoard();
  });
}

/* ============================================
   FILTERING & SEARCH
   ============================================ */

function applyFilters() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  const priorityFilter = document.getElementById('priority-filter').value;

  document.querySelectorAll('.column').forEach(colEl => {
    const colId = colEl.dataset.colId;
    const col = getColumnById(colId);
    if (!col) return;

    const cardsContainer = colEl.querySelector('.column-cards');
    const cardEls = cardsContainer.querySelectorAll('.card');

    cardEls.forEach(cardEl => {
      const cardId = cardEl.dataset.cardId;
      const card = col.cards.find(c => c.id === cardId);
      if (!card) return;

      const matchesSearch = !searchTerm || card.title.toLowerCase().includes(searchTerm);
      const matchesPriority = priorityFilter === 'all' || card.priority === priorityFilter;

      if (matchesSearch && matchesPriority) {
        cardEl.classList.remove('hidden-filter');
        cardEl.style.display = '';
      } else {
        cardEl.classList.add('hidden-filter');
      }
    });
  });
}

// Event listeners for filters
document.getElementById('search-input').addEventListener('input', () => {
  applyFilters();
});

document.getElementById('priority-filter').addEventListener('change', () => {
  applyFilters();
});

/* ============================================
   STATISTICS
   ============================================ */

function updateStats() {
  let total = 0;
  let overdue = 0;
  let done = 0;

  boardState.forEach(col => {
    col.cards.forEach(card => {
      total++;
      if (isOverdue(card.dueDate) && !card.done) {
        overdue++;
      }
      if (card.done || col.title === 'Done') {
        done++;
      }
    });
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-done').textContent = done;

  const rate = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('stat-completion').textContent = rate + '%';
}

/* ============================================
   INITIALIZATION
   ============================================ */

function init() {
  const saved = loadState();
  if (saved) {
    boardState = saved;
  } else {
    boardState = getInitialBoard();
    saveState();
  }
  renderBoard();
}

// Start the app
init();
</script>
