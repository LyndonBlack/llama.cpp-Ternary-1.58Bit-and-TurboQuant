<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      padding: 10px;
      margin: 5px 0;
      background-color: #fff;
      border: 1px solid #ccc;
      display: inline-block;
      width: 300px;
      text-align: left;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .task-input {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      cursor: pointer;
    }

    .counter {
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="counter">
    <span>Active: <span id="activeCount">0</span></span>
    <span>| Completed: <span id="completedCount">0</span></span>
    <span>| Total: <span id="totalCount">0</span></span>
  </div>

  <h1>Task Manager</h1>

  <div class="task-input">
    <input type="text" id="taskInput" placeholder="Enter a task" />
    <button onclick="addTask()">Add Task</button>
  </div>

  <ul id="taskList">
    <!-- Hardcoded tasks will be added here -->
  </ul>

  <button onclick="clearAll()">Clear All</button>

  <script>
    // Initialize tasks from localStorage or hardcode
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    const taskList = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const activeCount = document.getElementById('activeCount');
    const completedCount = document.getElementById('completedCount');
    const totalCount = document.getElementById('totalCount');

    // Render tasks
    function renderTasks() {
      taskList.innerHTML = '';
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.textContent = task;
        li.classList.add('task-item');

        // Toggle completion
        li.addEventListener('click', () => {
          task.completed = !task.completed;
          renderTasks();
        });

        // Delete button
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.onclick = () => {
          tasks.splice(index, 1);
          renderTasks();
        };

        li.appendChild(delBtn);
        taskList.appendChild(li);
      });

      // Update counters
      activeCount.textContent = tasks.filter(t => !t.completed).length;
      completedCount.textContent = tasks.filter(t => t.completed).length;
      totalCount.textContent = tasks.length;
    }

    // Add task
    function addTask() {
      const taskText = taskInput.value.trim();
      if (taskText !== '') {
        tasks.push({ text: taskText, completed: false });
        taskInput.value = '';
        renderTasks();
      }
    }

    // Clear all tasks
    function clearAll() {
      if (confirm('Are you sure you want to clear all tasks?')) {
        tasks = [];
        localStorage.removeItem('tasks');
        renderTasks();
      }
    }

    // Initial render
    renderTasks();
  </script>

</body>
</html>
